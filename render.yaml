services:
  - type: web
    name: atman-rag-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_APP_NAME
        value: Atman RAG
      - key: OPENROUTER_SITE_URL
        value: https://fullstack-63owis4u6-sarveshs-projects-61fdd06b.vercel.app
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_PROVIDER
        value: local
      - key: FASTEMBED_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LOCAL_EMBEDDING_DIMENSIONS
        value: "512"
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: FRONTEND_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: AUTO_INGEST_SAMPLES
        value: "true"
      - key: ALLOW_SAMPLE_DOWNLOAD
        value: "true"
      - key: MIN_RELEVANCE_SCORE
        value: "0.20"
      - key: EXTRACTIVE_FALLBACK_SCORE
        value: "0.35"
      - key: TOP_K
        value: "5"
